  <script>
  window.addEventListener("load", () => {
const isMobile = matchMedia("(max-width: 768px)").matches;
  document.querySelectorAll("[fd-svg-underline-text]").forEach(el => {
    const mode   = el.getAttribute("fd-svg-underline-text"); // load | scroll
    const stroke = el.getAttribute("fd-svg-underline-stroke") || 4;
    const offset = el.getAttribute("fd-svg-underline-offset");
    const color  = el.getAttribute("fd-svg-underline-color") || "#FF5B1A";
    const lh     = el.getAttribute("fd-line-height");
    if (lh) el.style.lineHeight = lh;
    // ---- 1. Wrap inner content in span (only once)
    if (!el.querySelector(".fd-underline-text")) {
      const span = document.createElement("span");
      span.className = "fd-underline-text";
      while (el.firstChild) {
        span.appendChild(el.firstChild);
      }
      el.appendChild(span);
    }
    // ---- 2. Insert SVG as sibling
    if (!el.querySelector(".fd-underline-svg")) {
      el.insertAdjacentHTML("beforeend", `
        <div class="fd-underline-svg" ${offset !== null ? `style="bottom:${offset}px"` : ""}>
          <svg width="100%" viewBox="0 0 245 10" aria-hidden="true">
            <path d="M2 7.7C42 5.2 155 -3.8 243 7.7"
              fill="none"
              stroke="${color}"
              stroke-width="${isMobile ? stroke * 0.85 : stroke}"
              stroke-linecap="round"/>
          </svg>
        </div>
      `);
    }
    // ---- 3. Animate underline
    const p = el.querySelector("path");
    const l = p.getTotalLength();
    const delay = 0.825;
    const duration = 0.75;
    p.style.strokeDasharray = l;
    p.style.strokeDashoffset = l;
    gsap.to(p, mode === "scroll"
      ? {
          strokeDashoffset: 0,
          duration,
      	  delay,
          scrollTrigger: {
            trigger: el,
            start: "top 70%",
            //scrub: true
            toggleActions: "play none none none",
             onEnter: () => console.log("Underline entered:", el),
          }
        }
      : {
          strokeDashoffset: 0,
      	  delay,
          duration,
          ease: "power2.out"
        }
    );
  });
});
</script>
